<nav class="modern-navbar">
  <div class="container navbar-container">
    
    <a routerLink="/home" class="navbar-brand">
      <div class="brand-icon">
        <i class="fas fa-graduation-cap"></i>
      </div>
      <span class="brand-text">Kampüs Kulüp</span>
    </a>

    <div class="navbar-links">
      <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <i class="fas fa-home"></i> Anasayfa
      </a>
      
      <a routerLink="/clubs" routerLinkActive="active">
        <i class="fas fa-globe"></i> Üniversite Kulüpleri
      </a>

      <ng-container *ngIf="!authService.currentUser()">
        <a routerLink="/login" class="btn-login-modern">
          Giriş Yap <i class="fas fa-arrow-right"></i>
        </a>
      </ng-container>

      <ng-container *ngIf="authService.currentUser()">
        <a routerLink="/clubs/create" routerLinkActive="active" class="create-club-nav-btn">
          <i class="fas fa-plus-circle"></i> Yeni Kulüp Kur
        </a>

        <a routerLink="/my-clubs" routerLinkActive="active">
          <i class="fas fa-id-badge"></i> Kulüplerim
        </a>

        <a routerLink="/chatbot" routerLinkActive="active" class="chatbot-link">
          <i class="fas fa-robot"></i> Yönetmelik Asistanı
        </a>
        
        <div class="user-profile-container">
          <a routerLink="/profile" class="user-badge" routerLinkActive="active">
            <div class="avatar-circle">
              {{ authService.currentUser()?.fullName?.charAt(0) | uppercase }}
            </div>
            <span class="user-name">{{ authService.currentUser()?.fullName }}</span>
          </a>
          
          <button class="btn-logout-modern" (click)="authService.logout()" title="Çıkış Yap">
            <i class="fas fa-power-off"></i>
          </button>
        </div>
      </ng-container>

    </div>
  </div>
</nav>
